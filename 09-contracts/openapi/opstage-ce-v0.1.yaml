          type: [string, 'null']
          pattern: '^usr_'
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: [string, 'null']
          format: date-time
        completedAt:
          type: [string, 'null']
          format: date-time
        expiresAt:
          type: [string, 'null']
          format: date-time
    CommandDetail:
      allOf:
        - $ref: '#/components/schemas/Command'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/CommandResult'
    CommandResult:
      type: object
      required: [id, commandId, success, reportedAt]
      properties:
        id:
          type: string
          pattern: '^crs_'
        commandId:
