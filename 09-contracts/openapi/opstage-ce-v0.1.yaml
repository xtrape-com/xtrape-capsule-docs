openapi: 3.1.0
info:
  title: Opstage CE API
  version: 0.1.0
  summary: CE v0.1 API contract for Opstage Capsule Service governance.
  description: |
    This contract defines the CE v0.1 Admin API, Agent API, and System API.
    Admin API uses /api/admin/*, Agent API uses /api/agents/*, and System API uses /api/system/*.
servers:
  - url: http://localhost:8080
    description: Local CE development server
security: []
tags:
  - name: AdminAuth
  - name: AdminDashboard
  - name: AdminAgents
  - name: AdminRegistrationTokens
  - name: AdminCapsuleServices
  - name: AdminCommands
  - name: AdminAuditEvents
  - name: Agent
  - name: System
paths:
  /api/admin/auth/login:
    post:
      tags: [AdminAuth]
      summary: Log in an admin user.
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/auth/logout:
    post:
      tags: [AdminAuth]
      summary: Log out current admin session.
      operationId: adminLogout
      security:
        - AdminSessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/auth/me:
    get:
      tags: [AdminAuth]
      summary: Get current admin user.
      operationId: adminMe
      security:
        - AdminSessionCookie: []
      responses:
        '200':
          description: Current admin user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/dashboard/summary:
    get:
      tags: [AdminDashboard]
      summary: Get CE dashboard summary.
      operationId: getDashboardSummary
      security:
        - AdminSessionCookie: []
      responses:
        '200':
          description: Dashboard summary.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardSummary'
  /api/admin/agents:
    get:
      tags: [AdminAgents]
      summary: List Agents.
      operationId: listAgents
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AgentStatus'
      responses:
        '200':
          description: Agent list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Agent'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
  /api/admin/agents/{agentId}:
    get:
      tags: [AdminAgents]
      summary: Get Agent detail.
      operationId: getAgent
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/agents/{agentId}/disable:
    post:
      tags: [AdminAgents]
      summary: Disable an Agent.
      operationId: disableAgent
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/admin/agents/{agentId}/enable:
    post:
      tags: [AdminAgents]
      summary: Enable an Agent.
      operationId: enableAgent
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/admin/agents/{agentId}/revoke:
    post:
      tags: [AdminAgents]
      summary: Revoke an Agent.
      operationId: revokeAgent
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/admin/registration-tokens:
    post:
      tags: [AdminRegistrationTokens]
      summary: Create a registration token.
      operationId: createRegistrationToken
      security:
        - AdminSessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegistrationTokenRequest'
      responses:
        '200':
          description: Registration token created. Raw token is shown only once.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateRegistrationTokenResponse'
    get:
      tags: [AdminRegistrationTokens]
      summary: List registration tokens without raw token values.
      operationId: listRegistrationTokens
      security:
        - AdminSessionCookie: []
      responses:
        '200':
          description: Registration token list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RegistrationToken'
  /api/admin/registration-tokens/{tokenId}/revoke:
    post:
      tags: [AdminRegistrationTokens]
      summary: Revoke a registration token.
      operationId: revokeRegistrationToken
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/admin/capsule-services:
    get:
      tags: [AdminCapsuleServices]
      summary: List Capsule Services.
      operationId: listCapsuleServices
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CapsuleServiceStatus'
      responses:
        '200':
          description: Capsule Service list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CapsuleService'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
  /api/admin/capsule-services/{serviceId}:
    get:
      tags: [AdminCapsuleServices]
      summary: Get Capsule Service detail.
      operationId: getCapsuleService
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Capsule Service detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CapsuleServiceDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/capsule-services/{serviceId}/manifest:
    get:
      tags: [AdminCapsuleServices]
      summary: Get Capsule Service manifest JSON.
      operationId: getCapsuleServiceManifest
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Manifest JSON.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties: true
  /api/admin/capsule-services/{serviceId}/health:
    get:
      tags: [AdminCapsuleServices]
      summary: Get latest health report.
      operationId: getCapsuleServiceHealth
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Latest health report.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HealthReport'
  /api/admin/capsule-services/{serviceId}/configs:
    get:
      tags: [AdminCapsuleServices]
      summary: List config metadata.
      operationId: listCapsuleServiceConfigs
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Config metadata list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ConfigItem'
  /api/admin/capsule-services/{serviceId}/actions:
    get:
      tags: [AdminCapsuleServices]
      summary: List action definitions.
      operationId: listCapsuleServiceActions
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Action definition list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActionDefinition'
  /api/admin/capsule-services/{serviceId}/actions/{actionName}:
    post:
      tags: [AdminCapsuleServices]
      summary: Request predefined action execution.
      operationId: createActionCommand
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/ActionName'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionCommandRequest'
      responses:
        '200':
          description: Command created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/admin/commands:
    get:
      tags: [AdminCommands]
      summary: List Commands.
      operationId: listCommands
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CommandStatus'
      responses:
        '200':
          description: Command list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Command'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
  /api/admin/commands/{commandId}:
    get:
      tags: [AdminCommands]
      summary: Get Command detail.
      operationId: getCommand
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Command detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CommandDetail'
  /api/admin/audit-events:
    get:
      tags: [AdminAuditEvents]
      summary: List AuditEvents.
      operationId: listAuditEvents
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: AuditEvent list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditEvent'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
  /api/admin/audit-events/{auditEventId}:
    get:
      tags: [AdminAuditEvents]
      summary: Get AuditEvent detail.
      operationId: getAuditEvent
      security:
        - AdminSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AuditEventId'
      responses:
        '200':
          description: AuditEvent detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuditEvent'
  /api/agents/register:
    post:
      tags: [Agent]
      summary: Register an Agent with a registration token.
      operationId: registerAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
      responses:
        '200':
          description: Agent registered. Agent token is returned once.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterAgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/agents/{agentId}/heartbeat:
    post:
      tags: [Agent]
      summary: Send Agent heartbeat and optional health report.
      operationId: agentHeartbeat
      security:
        - AgentBearerToken: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentHeartbeatResponse'
  /api/agents/{agentId}/services/report:
    post:
      tags: [Agent]
      summary: Report Capsule Service manifest, configs, actions, and health.
      operationId: reportAgentServices
      security:
        - AgentBearerToken: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceReportRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/agents/{agentId}/commands:
    get:
      tags: [Agent]
      summary: Poll Commands assigned to the Agent.
      operationId: pollAgentCommands
      security:
        - AgentBearerToken: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Commands assigned to this Agent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Command'
  /api/agents/{agentId}/commands/{commandId}/result:
    post:
      tags: [Agent]
      summary: Report CommandResult.
      operationId: reportCommandResult
      security:
        - AgentBearerToken: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCommandResultRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/system/health:
    get:
      tags: [System]
      summary: Get system health.
      operationId: getSystemHealth
      responses:
        '200':
          description: System health.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemHealth'
  /api/system/version:
    get:
      tags: [System]
      summary: Get system version.
      operationId: getSystemVersion
      responses:
        '200':
          description: System version.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemVersion'
components:
  securitySchemes:
    AdminSessionCookie:
      type: apiKey
      in: cookie
      name: opstage_session
    AgentBearerToken:
      type: http
      scheme: bearer
      bearerFormat: opstage_agent token
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        pattern: '^agt_'
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        pattern: '^svc_'
    CommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
        pattern: '^cmd_'
    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
        pattern: '^tok_'
    AuditEventId:
      name: auditEventId
      in: path
      required: true
      schema:
        type: string
        pattern: '^aud_'
    ActionName:
      name: actionName
      in: path
      required: true
      schema:
        type: string
  responses:
    Ok:
      description: Operation succeeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorInfo'
    ErrorInfo:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    AdminSession:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, username, role, status]
      properties:
        id:
          type: string
          pattern: '^usr_'
        username:
          type: string
        displayName:
          type: [string, 'null']
        role:
          type: string
          enum: [owner]
        status:
          type: string
          enum: [ACTIVE, DISABLED]
    DashboardSummary:
      type: object
      required: [agentCounts, serviceCounts, commandCounts]
      properties:
        agentCounts:
          type: object
          additionalProperties:
            type: integer
        serviceCounts:
          type: object
          additionalProperties:
            type: integer
        commandCounts:
          type: object
          additionalProperties:
            type: integer
        recentCommands:
          type: array
          items:
            $ref: '#/components/schemas/Command'
        recentAuditEvents:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
    AgentStatus:
      type: string
      enum: [PENDING, ONLINE, OFFLINE, DISABLED, REVOKED]
    CapsuleServiceStatus:
      type: string
      enum: [UNKNOWN, HEALTHY, UNHEALTHY, STALE, OFFLINE]
    HealthStatus:
      type: string
      enum: [UP, DEGRADED, DOWN, UNKNOWN]
    CommandStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED, EXPIRED, CANCELLED]
    DangerLevel:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    AuditActorType:
      type: string
      enum: [USER, AGENT, SYSTEM]
    AuditResult:
      type: string
      enum: [SUCCESS, FAILURE]
    Agent:
      type: object
      required: [id, code, mode, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          pattern: '^agt_'
        code:
          type: string
        name:
          type: [string, 'null']
        mode:
          type: string
          enum: [embedded, sidecar, external]
        runtime:
          type: [string, 'null']
        status:
          $ref: '#/components/schemas/AgentStatus'
        lastHeartbeatAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegistrationToken:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:
          type: string
          pattern: '^tok_'
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, USED, REVOKED, EXPIRED]
        expiresAt:
          type: [string, 'null']
          format: date-time
        usedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
    CreateRegistrationTokenRequest:
      type: object
      properties:
        name:
          type: string
          default: Default registration token
        expiresInSeconds:
          type: integer
          minimum: 60
    CreateRegistrationTokenResponse:
      allOf:
        - $ref: '#/components/schemas/RegistrationToken'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: Raw token shown only once.
              pattern: '^opstage_reg_'
    CapsuleService:
      type: object
      required: [id, code, name, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          pattern: '^svc_'
        agentId:
          type: string
          pattern: '^agt_'
        code:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        version:
          type: [string, 'null']
        runtime:
          type: [string, 'null']
        status:
          $ref: '#/components/schemas/CapsuleServiceStatus'
        healthStatus:
          $ref: '#/components/schemas/HealthStatus'
        lastReportedAt:
          type: [string, 'null']
          format: date-time
        lastHealthAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CapsuleServiceDetail:
      allOf:
        - $ref: '#/components/schemas/CapsuleService'
        - type: object
          properties:
            manifest:
              type: object
              additionalProperties: true
            health:
              $ref: '#/components/schemas/HealthReport'
            configs:
              type: array
              items:
                $ref: '#/components/schemas/ConfigItem'
            actions:
              type: array
              items:
                $ref: '#/components/schemas/ActionDefinition'
    HealthReport:
