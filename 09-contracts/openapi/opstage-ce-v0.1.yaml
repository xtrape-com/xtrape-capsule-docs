        label:
          type: string
        type:
          type: string
        source:
          type: string
        editable:
          type: boolean
        sensitive:
          type: boolean
        valuePreview:
          type: string
        defaultValue:
          type: string
        secretRef:
          type: string
    ActionDefinitionInput:
      type: object
      required: [name, label]
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
        dangerLevel:
          $ref: '#/components/schemas/DangerLevel'
        requiresConfirmation:
          type: boolean
        inputSchema:
          type: object
          additionalProperties: true
        timeoutSeconds:
          type: integer
    AuditEvent:
      type: object
