          type: [string, 'null']
        type:
          type: string
        source:
          type: [string, 'null']
        editable:
          type: boolean
        sensitive:
          type: boolean
        valuePreview:
          type: [string, 'null']
        defaultValue:
          type: [string, 'null']
        secretRef:
          type: [string, 'null']
    ActionDefinition:
      type: object
