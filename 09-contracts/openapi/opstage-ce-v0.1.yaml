        data:
          type: object
          additionalProperties: true
        error:
          type: object
          additionalProperties: true
        reportedAt:
          type: string
          format: date-time
    ReportCommandResultRequest:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        error:
          type: object
          additionalProperties: true
    RegisterAgentRequest:
