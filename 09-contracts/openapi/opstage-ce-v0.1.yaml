          type: string
          pattern: '^svc_'
        name:
          type: string
        label:
          type: string
        description:
          type: [string, 'null']
        dangerLevel:
          $ref: '#/components/schemas/DangerLevel'
        requiresConfirmation:
          type: boolean
        inputSchema:
          type: object
          additionalProperties: true
        timeoutSeconds:
          type: integer
    CreateActionCommandRequest:
